<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Todo List</h1>

    <div class="cadastrar">
        <form th:action="@{/add}" method="post">
            <input type="text" name="tarefa">
            <br>
            <input type="date" name="dataLimite">
            <button type="submit">novo</button>
        </form>
    </div>

    <ul>
        <li th:each="tarefa : ${todoList}">
            <span th:text="${tarefa.id}" ></span> | 
            <span th:text="${tarefa.tarefa}" ></span> | 
            <span th:text="${tarefa.estado.descricao}" ></span> | 
            <span th:text="${tarefa.dataLimite}" ></span> | 

            <a th:href="@{/aterar-estado/{id} (id = ${tarefa.id}) }">alterar estado</a>
            <a th:href="@{/remover/{id} (id = ${tarefa.id}) }">remover</a>
        </li>
    </ul>
    
</body>
</html>
